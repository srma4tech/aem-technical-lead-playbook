max_retries = 3
retry_wait_time = 2
timeout = 20
# ACM's canonical Code of Ethics page serves automated requests with HTTP 403.
# Keep the reference in the handbook and exclude only the bot-protected URL.
exclude = [
  '^https://srma4tech.github.io/aem-technical-lead-playbook/?$',
  '^https://www.acm.org/code-of-ethics$'
]
exclude_path = ["site", "node_modules"]
