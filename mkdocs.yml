site_name: AEM Technical Lead Playbook
site_description: Open-source handbook for Adobe Experience Manager, enterprise Java, architecture, production engineering, and technical leadership.
site_author: AEM Technical Lead Playbook contributors
site_url: https://srma4tech.github.io/aem-technical-lead-playbook/
repo_url: https://github.com/srma4tech/aem-technical-lead-playbook
repo_name: srma4tech/aem-technical-lead-playbook
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 AEM Technical Lead Playbook contributors. Released under the MIT License.

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  keywords:
    - Adobe Experience Manager
    - AEM
    - enterprise Java
    - technical leadership
    - system design
    - software architecture
  social_preview: assets/images/social-preview-placeholder.svg
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/srma4tech/aem-technical-lead-playbook
      name: Project repository
    - icon: fontawesome/solid/comments
      link: https://github.com/srma4tech/aem-technical-lead-playbook/discussions
      name: Community discussions

