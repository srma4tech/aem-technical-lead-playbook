          - Clean Code: 00-engineering-principles/03-clean-code.md
          - Production Ownership: 00-engineering-principles/04-production-ownership.md
          - Decision Making: 00-engineering-principles/05-decision-making.md
          - Engineering Excellence: 00-engineering-principles/06-engineering-excellence.md
          - Documentation Culture: 00-engineering-principles/07-documentation-culture.md
          - Code Review Philosophy: 00-engineering-principles/08-code-review-philosophy.md
          - Performance Thinking: 00-engineering-principles/09-performance-thinking.md
          - Security First: 00-engineering-principles/10-security-first.md
          - Debugging Mindset: 00-engineering-principles/11-debugging-mindset.md
          - Learning Culture: 00-engineering-principles/12-learning-culture.md
          - Mentorship: 00-engineering-principles/13-mentorship.md
          - Career Growth: 00-engineering-principles/14-career-growth.md
