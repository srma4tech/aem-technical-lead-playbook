{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta name="author" content="{{ config.site_author }}">
  <meta name="keywords" content="{{ config.extra.keywords | join(', ') }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ page.title if page and page.title else config.site_name }}">
  <meta property="og:description" content="{{ page.meta.description if page and page.meta and page.meta.description else config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url if page and page.canonical_url else config.site_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/images/social-preview-placeholder.svg">
{% endblock %}
